<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta
      name="description"
      content="Sapientia — Plataforma de aprendizaje en línea"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Sapientia · LMS</title>

    <!--
      ═══════════════════════════════════════════════════════════════
      TEMA: Script de inicialización síncrono (IIFE)
      ───────────────────────────────────────────────────────────────
      Se ejecuta ANTES de que React hidrate — evita el flash de
      dark/light mode y garantiza consistencia desde el primer pixel.

      Lógica:
        • Si localStorage tiene 'theme=dark' → aplicar dark
        • Cualquier otro caso (light, vacío, null) → aplicar light
        • El ThemeContext de React sincroniza su estado con este valor
      ═══════════════════════════════════════════════════════════════
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');

          if (saved === 'dark') {
            // El usuario eligió explícitamente dark → respetar
            document.documentElement.classList.add('dark');
          } else {
            // Sin preferencia guardada O eligió light → forzar light
            // También limpia valores corruptos ('undefined', null, etc.)
            document.documentElement.classList.remove('dark');
            if (saved !== 'light') {
              // Normalizar: si no era 'dark' ni 'light', borrar el valor basura
              localStorage.removeItem('theme');
            }
          }
        } catch (e) {
          // localStorage bloqueado (navegación privada/política) → fallback light
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <noscript>Necesitas JavaScript para usar Sapientia.</noscript>
    <div id="root"></div>
  </body>
</html>
